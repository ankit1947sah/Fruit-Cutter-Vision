name: Fruit Cutter Vision CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test_and_benchmark:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-2.0-0 libsdl2-mixer-2.0-0 libsdl2-image-2.0-0 libsdl2-ttf-2.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame-ce opencv-python mediapipe numpy pytest psutil

    - name: Run Unit Tests
      run: |
        python -m unittest discover -s tests

    - name: Run Performance Benchmarks
      run: |
        python benchmark.py

    - name: Upload Performance Report
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-report
        path: logs/benchmark_report.txt
